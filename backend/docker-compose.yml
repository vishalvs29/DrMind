version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: drmindit_db
    restart: always
    environment:
      POSTGRES_USER: drmindit_user
      POSTGRES_PASSWORD: drmindit_password
      POSTGRES_DB: drmindit
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: drmindit_cache
    restart: always
    ports:
      - '6379:6379'

  pgadmin:
    image: dpage/pgadmin4
    container_name: drmindit_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@drmindit.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - '8080:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
